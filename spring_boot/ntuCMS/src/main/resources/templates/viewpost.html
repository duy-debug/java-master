<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi ti&#7871;t b&agrave;i vi&#7871;t</title>
  <style>
    :root { --bg:#ffffff; --panel:#ffffff; --text:#16324f; --muted:#667085; --line:#d9e2ec; --primary:#0f6cbd; --shadow:0 16px 36px rgba(15,43,77,.06); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; background:var(--bg); color:var(--text); }
    .container { max-width:780px; margin:0 auto; padding:32px 20px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); padding:28px; }
    h1 { margin:0 0 8px; font-size:28px; }
    .subtitle { margin:0 0 24px; color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
    .item { padding:18px; border:1px solid var(--line); border-radius:16px; background:#f8fbff; }
    .full { grid-column:1 / -1; }
    .label { display:block; margin-bottom:8px; color:var(--muted); font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .value { margin:0; font-size:17px; line-height:1.6; white-space:pre-wrap; }
    .actions { margin-top:24px; display:flex; gap:12px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; justify-content:center; padding:10px 16px; border-radius:12px; text-decoration:none; font-weight:600; border:1px solid var(--line); color:var(--text); background:#fff; }
    .btn-primary { color:#fff; background:var(--primary); border-color:var(--primary); }
    .empty { padding:24px; border:1px dashed var(--line); border-radius:16px; color:var(--muted); }
  </style>
</head>
<body>
<div class="container">
  <div class="card" th:if="${post != null}">
    <h1>Chi ti&#7871;t b&agrave;i vi&#7871;t</h1>
    <p class="subtitle">Th&ocirc;ng tin &#273;&#7847;y &#273;&#7911; c&#7911;a post &#273;&atilde; ch&#7885;n.</p>
    <div class="grid">
      <div class="item"><span class="label">ID</span><p class="value" th:text="${post.id}"></p></div>
      <div class="item"><span class="label">M&atilde; danh m&#7909;c</span><p class="value" th:text="${post.categoryId}"></p></div>
      <div class="item full"><span class="label">Ti&ecirc;u &#273;&#7873;</span><p class="value" th:text="${post.title}"></p></div>
      <div class="item full"><span class="label">N&#7897;i dung</span><p class="value" th:text="${post.content}"></p></div>
    </div>
    <div class="actions"><a href="/post/all" class="btn">Quay l&#7841;i danh s&aacute;ch</a><a href="/" class="btn btn-primary">V&#7873; dashboard</a></div>
  </div>
  <div class="card" th:if="${post == null}">
    <div class="empty">Kh&ocirc;ng t&igrave;m th&#7845;y b&agrave;i vi&#7871;t c&#7847;n xem.</div>
    <div class="actions"><a href="/post/all" class="btn">Quay l&#7841;i danh s&aacute;ch</a></div>
  </div>
</div>
</body>
</html>
