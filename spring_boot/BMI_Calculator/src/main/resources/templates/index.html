<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style> body{
    font-family: Arial, sans-serif;
    background:#f2f2f2; display:flex;
    justify-content:center;
    align-items:center;
    height:100vh; }
.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:350px; }
h2{ text-align:center;
    margin-bottom:20px; }
label{ font-weight:bold; }
input{
    width:100%;
    padding:10px;
    margin:8px 0 15px 0;
    border:1px solid #ccc;
    border-radius:5px; }
button{
    display: block;
    margin: 0 auto;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}
button:hover{
    background:#45a049; }
</style>
<body>
<div class="container">
    <h2>BMI Calculator</h2>
    <form action="/bmi" method="post">
        <label>Chiều cao (cm):</label>
        <input type="text" name="height" placeholder="Nhập chiều cao" required>
        <p style="color: red;" th:text="${heightError}"></p>
        <label>Cân nặng (kg):</label>
        <input type="text" name="weight" placeholder="Nhập cân nặng" required>
        <p style="color:red" th:text="${weightError}"></p>
        <button type="submit">Tính BMI</button>
    </form>
</div>
</body>
</html>
